<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#3182f6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="테르메스">
<link rel="manifest" href="manifest.json">
<title>테르메스 테니스 클럽</title>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
:root{
  --blue:#3182f6;--blue-l:#ebf3fe;--green:#00b493;--green-l:#e6f8f5;
  --gray-100:#f2f4f6;--gray-200:#e5e8eb;--gray-400:#b0b8c1;--gray-500:#8b95a1;
  --gray-600:#6b7684;--gray-800:#333d4b;--gray-900:#191f28;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f5f6f8;font-family:'Pretendard',-apple-system,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px}

/* 로고 */
.logo-wrap{text-align:center;margin-bottom:48px}
.logo{font-size:3rem;font-weight:900;letter-spacing:3px;color:var(--gray-900);line-height:1}
.logo b{color:var(--blue)}
.logo-kor{font-size:15px;color:var(--gray-500);margin-top:8px;font-weight:500;letter-spacing:1px}
.logo-desc{font-size:13px;color:var(--gray-400);margin-top:4px}

/* 입장 버튼 */
.btns{display:flex;flex-direction:column;gap:12px;width:100%;max-width:340px}
.enter-btn{display:flex;align-items:center;gap:16px;padding:20px 22px;border-radius:18px;text-decoration:none;font-weight:700;font-size:16px;transition:transform .1s,box-shadow .1s;border:none;cursor:pointer;font-family:'Pretendard',sans-serif;width:100%}
.enter-btn:active{transform:scale(.98)}
.btn-member{background:#fff;box-shadow:0 2px 14px rgba(0,0,0,.09);color:var(--gray-900)}
.btn-admin{background:var(--blue);color:#fff;box-shadow:0 4px 16px rgba(49,130,246,.35)}
.btn-icon-wrap{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.member-icon-wrap{background:var(--green-l)}
.admin-icon-wrap{background:rgba(255,255,255,.2)}
.btn-text-wrap{flex:1;text-align:left}
.btn-title{font-size:16px;font-weight:700;margin-bottom:3px}
.btn-desc{font-size:13px;font-weight:400;opacity:.6}

/* 앱 설치 배너 */
.install-banner{display:none;width:100%;max-width:340px;margin-top:20px;background:#fff;border-radius:16px;padding:16px 18px;box-shadow:0 2px 10px rgba(0,0,0,.08);align-items:center;gap:14px}
.install-banner.show{display:flex}
.install-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--blue),#1a56db);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.install-text{flex:1}
.install-title{font-size:15px;font-weight:700;color:var(--gray-900);margin-bottom:2px}
.install-desc{font-size:13px;color:var(--gray-500)}
.install-action{background:var(--blue-l);color:var(--blue);border:none;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Pretendard',sans-serif;white-space:nowrap;flex-shrink:0}

/* iOS 설치 안내 */
.ios-guide{display:none;width:100%;max-width:340px;margin-top:16px;background:#fff;border-radius:16px;padding:18px 20px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.ios-guide.show{display:block}
.ios-guide-title{font-size:15px;font-weight:700;color:var(--gray-900);margin-bottom:12px}
.ios-steps{display:flex;flex-direction:column;gap:10px}
.ios-step{display:flex;align-items:flex-start;gap:10px}
.ios-step-num{width:22px;height:22px;background:var(--blue);color:#fff;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.ios-step-text{font-size:14px;color:var(--gray-700);line-height:1.5}
.ios-step-text b{color:var(--gray-900)}
.ios-close{margin-top:14px;width:100%;padding:10px;background:var(--gray-100);border:none;border-radius:10px;font-family:'Pretendard',sans-serif;font-size:14px;font-weight:600;color:var(--gray-600);cursor:pointer}

/* 이미 앱 설치됨 안내 */
.installed-badge{display:none;width:100%;max-width:340px;margin-top:14px;background:var(--green-l);border-radius:12px;padding:11px 16px;align-items:center;gap:8px}
.installed-badge.show{display:flex}
.installed-badge-text{font-size:13px;font-weight:600;color:var(--green)}

.footer{margin-top:36px;font-size:12px;color:var(--gray-400);text-align:center;line-height:2}
</style>
</head>
<body>

<div class="logo-wrap">
  <div class="logo">TER<b>MES</b></div>
  <div class="logo-kor">테르메스 테니스 클럽</div>
  <div class="logo-desc">회원 전용 대진 관리 서비스</div>
</div>

<div class="btns">
  <a href="member.html" class="enter-btn btn-member">
    <div class="btn-icon-wrap member-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00b493" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>
      </svg>
    </div>
    <div class="btn-text-wrap">
      <div class="btn-title">정회원 입장</div>
      <div class="btn-desc">대진표 · 점수 입력 · 랭킹</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#b0b8c1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </a>

  <a href="admin.html" class="enter-btn btn-admin">
    <div class="btn-icon-wrap admin-icon-wrap">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="btn-text-wrap">
      <div class="btn-title">임원진 입장</div>
      <div class="btn-desc">대진 생성 · 참석 · 등급 관리</div>
    </div>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</div>

<!-- Android/Chrome 설치 배너 -->
<div class="install-banner" id="installBanner">
  <div class="install-icon">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </div>
  <div class="install-text">
    <div class="install-title">홈 화면에 추가</div>
    <div class="install-desc">앱처럼 바로 실행할 수 있어요</div>
  </div>
  <button class="install-action" onclick="installPWA()">추가</button>
</div>

<!-- iOS 설치 안내 -->
<div class="ios-guide" id="iosGuide">
  <div class="ios-guide-title">홈 화면에 추가하는 방법</div>
  <div class="ios-steps">
    <div class="ios-step">
      <div class="ios-step-num">1</div>
      <div class="ios-step-text">하단의 <b>공유 버튼</b>을 탭하세요<br><span style="font-size:12px;color:#8b95a1">( Safari 주소창 옆 네모+화살표 아이콘 )</span></div>
    </div>
    <div class="ios-step">
      <div class="ios-step-num">2</div>
      <div class="ios-step-text"><b>홈 화면에 추가</b>를 선택하세요</div>
    </div>
    <div class="ios-step">
      <div class="ios-step-num">3</div>
      <div class="ios-step-text">오른쪽 위 <b>추가</b>를 탭하면 완료!</div>
    </div>
  </div>
  <button class="ios-close" onclick="document.getElementById('iosGuide').classList.remove('show')">닫기</button>
</div>

<!-- 설치 완료 -->
<div class="installed-badge" id="installedBadge">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#00b493" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span class="installed-badge-text">홈 화면에 추가되어 있습니다</span>
</div>

<div class="footer">
  테르메스 테니스 클럽<br>
  © 2026 All rights reserved
</div>

<script>
let deferredPrompt = null;

// 이미 설치된 경우 감지
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
  document.getElementById('installedBadge').classList.add('show');
}

// Android / Chrome — beforeinstallprompt
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});

// 설치 완료
window.addEventListener('appinstalled', () => {
  document.getElementById('installBanner').classList.remove('show');
  document.getElementById('installedBadge').classList.add('show');
  deferredPrompt = null;
});

async function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('installBanner').classList.remove('show');
  }
  deferredPrompt = null;
}

// iOS Safari 감지 — 안내 배너 표시
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;

if (isIOS && isSafari && !isStandalone) {
  document.getElementById('iosGuide').classList.add('show');
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
